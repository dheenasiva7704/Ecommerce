<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FashionHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="#">
            FashionHub
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Products
                    </a>
                </li>

            </ul>

            <input
                type="text"
                id="search"
                class="form-control w-25 me-3"
                placeholder="Search Product">

            <a href="cart.html"
               class="btn btn-success">

                Cart
                <span id="cartCount"
                      class="badge bg-danger">
                      0
                </span>

            </a>

        </div>

    </div>

</nav>

<!-- Hero Section -->

<section class="hero text-center">
    <div class="hero-banner position-relative">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=1600&q=80" alt="Fashion banner" class="hero-banner-img w-100">
        <div class="hero-overlay d-flex flex-column justify-content-center align-items-center text-white">
            <h1>FashionHub</h1>
            <p>Latest Fashion Collection</p>
            <button class="btn btn-light" onclick="document.getElementById('productContainer').scrollIntoView({ behavior: 'smooth' });">Shop Now</button>
        </div>
    </div>
</section>

<!-- Categories -->

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Categories
    </h2>

    <div class="row">

        <div class="col-md-3 mb-3">

            <div class="card text-center p-3">

                <h5>Men</h5>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center p-3">

                <h5>Women</h5>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center p-3">

                <h5>Electronics</h5>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center p-3">

                <h5>Jewelry</h5>

            </div>

        </div>

    </div>

</div>

<!-- Products -->

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Featured Products
    </h2>

    <div class="row"
         id="productContainer">

    </div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center p-3 mt-5">

    <p>
        FashionHub © 2026
    </p>

</footer>

<script src="products.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
